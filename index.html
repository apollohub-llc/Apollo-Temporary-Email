<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Apollo Temp Email - Auto Inbox</title>
  <style>
    :root {
      --primary: #ff8c00;
      --primary-glow: rgba(255, 140, 0, 0.4);
      --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1e1e 100%);
      --card-bg: rgba(30, 41, 59, 0.7);
      --text: #f8fafc;
      --text-muted: #94a3b8;
      --border: rgba(255, 140, 0, 0.3);
      --success: #22c55e;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg-gradient);
      background-attachment: fixed;
      color: var(--text);
      min-height: 100vh;
      padding: 1rem;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
    }

    /* Header */
    .header {
      text-align: center;
      margin-bottom: 2rem;
    }

    h1 {
      font-size: 3rem;
      background: linear-gradient(135deg, #ff8c00, #ffbd69, #ffa500);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.5rem;
    }

    .subtitle {
      color: var(--text-muted);
      font-size: 0.9rem;
    }

    /* Email Display */
    .email-section {
      background: var(--card-bg);
      border-radius: 16px;
      padding: 1.5rem;
      margin-bottom: 2rem;
      border: 1px solid var(--border);
      backdrop-filter: blur(10px);
    }

    .email-label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--primary);
      display: block;
      margin-bottom: 0.5rem;
    }

    .email-box {
      background: rgba(0, 0, 0, 0.3);
      padding: 1rem;
      border-radius: 12px;
      font-size: 1.2rem;
      font-weight: 600;
      font-family: monospace;
      word-break: break-all;
      cursor: pointer;
      transition: all 0.2s;
      border: 1px solid transparent;
    }

    .email-box:hover {
      border-color: var(--primary);
      background: rgba(255, 140, 0, 0.1);
    }

    .copy-hint {
      font-size: 0.7rem;
      color: var(--text-muted);
      text-align: center;
      margin-top: 0.5rem;
    }

    /* Controls */
    .controls {
      display: flex;
      gap: 1rem;
      margin-bottom: 1.5rem;
      justify-content: center;
    }

    button {
      background: var(--primary);
      color: #000;
      border: none;
      padding: 0.6rem 1.2rem;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 0.9rem;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px var(--primary-glow);
    }

    .refresh-btn {
      background: rgba(255, 255, 255, 0.1);
      color: var(--text);
    }

    /* Inbox */
    .inbox {
      background: var(--card-bg);
      border-radius: 16px;
      border: 1px solid var(--border);
      overflow: hidden;
      backdrop-filter: blur(10px);
    }

    .inbox-header {
      padding: 1rem 1.5rem;
      background: rgba(0, 0, 0, 0.3);
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .inbox-header h2 {
      font-size: 1.2rem;
      color: var(--primary);
    }

    .status {
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    .message {
      padding: 1rem 1.5rem;
      border-bottom: 1px solid var(--border);
      transition: all 0.2s;
      cursor: pointer;
    }

    .message:hover {
      background: rgba(255, 140, 0, 0.05);
    }

    .message-subject {
      font-weight: 700;
      color: var(--text);
      margin-bottom: 0.3rem;
    }

    .message-preview {
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-bottom: 0.3rem;
    }

    .message-meta {
      display: flex;
      gap: 1rem;
      font-size: 0.7rem;
      color: var(--primary);
    }

    .empty-inbox {
      padding: 3rem;
      text-align: center;
      color: var(--text-muted);
    }

    /* Modal for full email */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.95);
      z-index: 1000;
      justify-content: center;
      align-items: center;
      padding: 1rem;
    }

    .modal-content {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 16px;
      max-width: 600px;
      width: 100%;
      max-height: 80vh;
      overflow-y: auto;
      padding: 1.5rem;
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    .close-modal {
      background: none;
      font-size: 1.5rem;
      padding: 0;
      color: var(--text);
    }

    .modal-body {
      line-height: 1.6;
      white-space: pre-wrap;
      word-wrap: break-word;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loading {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid var(--primary);
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>⚡ APOLLO</h1>
      <p class="subtitle">Temporary Email • Auto-refreshing Inbox</p>
    </div>

    <div class="email-section">
      <span class="email-label">📧 YOUR TEMPORARY EMAIL</span>
      <div class="email-box" id="emailDisplay">Loading...</div>
      <div class="copy-hint">✨ Click to copy</div>
    </div>

    <div class="controls">
      <button id="refreshBtn" class="refresh-btn">🔄 Refresh Inbox</button>
      <button id="newEmailBtn">✨ New Email Address</button>
    </div>

    <div class="inbox">
      <div class="inbox-header">
        <h2>📬 Inbox</h2>
        <span class="status" id="inboxStatus">Waiting for emails...</span>
      </div>
      <div id="messagesContainer">
        <div class="empty-inbox">📭 No emails yet. Send a test message!</div>
      </div>
    </div>
  </div>

  <!-- Modal for full email -->
  <div id="emailModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <strong id="modalSubject">Subject</strong>
        <button class="close-modal" id="closeModal">✕</button>
      </div>
      <div class="modal-body" id="modalBody"></div>
    </div>
  </div>

  <script>
    let currentSid = '';
    let currentEmail = '';
    let currentEmailUser = '';
    let refreshTimer = null;

    // DOM elements
    const emailDisplay = document.getElementById('emailDisplay');
    const messagesContainer = document.getElementById('messagesContainer');
    const inboxStatus = document.getElementById('inboxStatus');
    const refreshBtn = document.getElementById('refreshBtn');
    const newEmailBtn = document.getElementById('newEmailBtn');
    const modal = document.getElementById('emailModal');
    const modalSubject = document.getElementById('modalSubject');
    const modalBody = document.getElementById('modalBody');
    const closeModal = document.getElementById('closeModal');

    // Close modal when clicking X or outside
    closeModal.onclick = () => modal.style.display = 'none';
    modal.onclick = (e) => { if (e.target === modal) modal.style.display = 'none'; };

    // Show loading state
    function setLoading(isLoading) {
      if (isLoading) {
        inboxStatus.innerHTML = '<span class="loading"></span> Loading...';
      } else {
        inboxStatus.innerHTML = '✓ Auto-refreshing every 10s';
      }
    }

    // Generate a new email address
    async function generateNewEmail() {
      try {
        setLoading(true);
        const response = await fetch('https://api.guerrillamail.com/ajax.php?f=get_email_address');
        const data = await response.json();
        
        currentSid = data.sid_token;
        currentEmail = data.email_addr;
        currentEmailUser = data.email_addr.split('@')[0];
        
        emailDisplay.textContent = currentEmail;
        
        // Clear inbox
        messagesContainer.innerHTML = '<div class="empty-inbox">📭 No emails yet. Send a test message!</div>';
        
        // Fetch inbox for new email
        await fetchInbox(true);
        
        // Reset auto-refresh
        if (refreshTimer) clearInterval(refreshTimer);
        refreshTimer = setInterval(() => fetchInbox(false), 10000);
        
        setLoading(false);
      } catch (error) {
        console.error('Error generating email:', error);
        emailDisplay.textContent = 'Error - Refresh page';
        setLoading(false);
      }
    }

    // Fetch inbox messages
    async function fetchInbox(showLoading = false) {
      if (!currentEmailUser) return;
      
      try {
        if (showLoading) setLoading(true);
        
        const url = `https://api.guerrillamail.com/ajax.php?f=get_email_list&offset=0&email_user=${currentEmailUser}&sid_token=${currentSid}`;
        const response = await fetch(url);
        const data = await response.json();
        
        if (data.list && data.list.length > 0) {
          // Reverse so newest shows at top
          const messages = [...data.list].reverse();
          displayMessages(messages);
          inboxStatus.innerHTML = `📬 ${messages.length} message${messages.length !== 1 ? 's' : ''}`;
        } else {
          messagesContainer.innerHTML = '<div class="empty-inbox">📭 No emails yet. Send a test message!</div>';
          inboxStatus.innerHTML = '📭 Empty';
        }
        
        if (showLoading) setLoading(false);
      } catch (error) {
        console.error('Error fetching inbox:', error);
        if (showLoading) {
          messagesContainer.innerHTML = '<div class="empty-inbox">⚠️ Error loading inbox. Try refreshing.</div>';
          setLoading(false);
        }
      }
    }

    // Display messages in the inbox
    function displayMessages(messages) {
      if (!messages || messages.length === 0) {
        messagesContainer.innerHTML = '<div class="empty-inbox">📭 No emails yet. Send a test message!</div>';
        return;
      }
      
      messagesContainer.innerHTML = '';
      
      messages.forEach(msg => {
        const messageDiv = document.createElement('div');
        messageDiv.className = 'message';
        
        const subject = msg.mail_subject || '(no subject)';
        const preview = msg.mail_excerpt || (msg.mail_body ? msg.mail_body.substring(0, 100) : 'No content');
        const from = msg.mail_from || 'Unknown sender';
        const timestamp = msg.mail_timestamp ? new Date(msg.mail_timestamp * 1000).toLocaleString() : 'Unknown time';
        
        messageDiv.innerHTML = `
          <div class="message-subject">📧 ${escapeHtml(subject)}</div>
          <div class="message-preview">${escapeHtml(preview)}${preview.length >= 100 ? '...' : ''}</div>
          <div class="message-meta">
            <span>👤 ${escapeHtml(from)}</span>
            <span>🕐 ${timestamp}</span>
          </div>
        `;
        
        // Store full email data
        messageDiv.onclick = () => {
          modalSubject.textContent = subject;
          modalBody.innerHTML = `<strong>From:</strong> ${escapeHtml(from)}<br><br>${escapeHtml(msg.mail_body || 'No content')}`;
          modal.style.display = 'flex';
        };
        
        messagesContainer.appendChild(messageDiv);
      });
    }

    // Simple escape to prevent XSS
    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
      });
    }

    // Copy email to clipboard
    emailDisplay.onclick = async () => {
      if (!currentEmail) return;
      try {
        await navigator.clipboard.writeText(currentEmail);
        const original = emailDisplay.textContent;
        emailDisplay.textContent = '✓ Copied!';
        setTimeout(() => { emailDisplay.textContent = original; }, 1500);
      } catch (err) {
        // Fallback
        const textarea = document.createElement('textarea');
        textarea.value = currentEmail;
        document.body.appendChild(textarea);
        textarea.select();
        document.execCommand('copy');
        document.body.removeChild(textarea);
        emailDisplay.textContent = '✓ Copied!';
        setTimeout(() => { emailDisplay.textContent = currentEmail; }, 1500);
      }
    };

    // Button handlers
    refreshBtn.onclick = () => fetchInbox(true);
    newEmailBtn.onclick = () => generateNewEmail();

    // Initialize
    generateNewEmail();
  </script>
</body>
</html>
