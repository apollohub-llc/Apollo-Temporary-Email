<!DOCTYPE html>
<html>
<head>
    <title>Guerrilla Mail - Clean Inbox</title>
    <style>
        body { font-family: Arial; max-width: 800px; margin: 50px auto; padding: 20px; }
        .container { background: white; padding: 20px; border-radius: 10px; }
        input, button { padding: 10px; font-size: 16px; }
        button { background: #4CAF50; color: white; border: none; border-radius: 5px; cursor: pointer; margin-left: 10px; }
        .email-card { border: 1px solid #ddd; margin: 15px 0; padding: 15px; border-radius: 8px; background: #fafafa; }
        .subject { font-size: 18px; font-weight: bold; color: #333; }
        .from { color: #666; font-size: 14px; margin: 5px 0; }
        .code { background: #f0f0f0; padding: 10px; font-size: 24px; font-weight: bold; text-align: center; font-family: monospace; margin: 10px 0; border-radius: 5px; }
        .body { margin-top: 12px; padding: 10px; background: white; border-radius: 5px; white-space: pre-wrap; }
        .date { font-size: 12px; color: #999; margin-top: 10px; }
        .email-badge { background: #e8f5e9; padding: 10px; border-radius: 5px; margin: 15px 0; font-family: monospace; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📧 Guerrilla Mail - Clean Inbox</h1>
        
        <div>
            <input type="text" id="username" value="eqskwiqu" style="width: 250px;">
            <span>@guerrillamailblock.com</span>
            <button onclick="createEmail()">Create Inbox</button>
            <button onclick="checkInbox()" id="refreshBtn">🔄 Check Inbox</button>
        </div>
        
        <div id="currentEmail" style="display: none;">
            <div class="email-badge">
                <strong>📫 Your email:</strong> <span id="emailAddress"></span>
                <button onclick="copyEmail()" style="margin-left: 15px;">📋 Copy</button>
            </div>
        </div>
        
        <div id="inbox">
            <p style="color: #999;">Create an email to see your inbox</p>
        </div>
    </div>

    <script>
        let currentSidToken = null;
        let currentEmail = null;
        const API_URL = 'https://api.guerrillamail.com/ajax.php';

        async function createEmail() {
            let username = document.getElementById('username').value.trim();
            if (!username) username = Math.random().toString(36).substring(2, 12);
            
            const domain = 'guerrillamailblock.com';
            const email = `${username}@${domain}`;
            
            try {
                const response = await fetch(`${API_URL}?f=set_email_user&email_user=${username}&site=guerrillamail.com&domain=${domain}`);
                const data = await response.json();
                
                if (data && data.email_addr) {
                    currentEmail = data.email_addr;
                    currentSidToken = data.sid_token;
                    
                    document.getElementById('emailAddress').textContent = currentEmail;
                    document.getElementById('currentEmail').style.display = 'block';
                    
                    await checkInbox();
                }
            } catch (error) {
                document.getElementById('inbox').innerHTML = `<p style="color:red">Error: ${error.message}</p>`;
            }
        }
        
        // Extract verification code from email content
        function extractCode(text) {
            // Look for patterns like "code is 123456" or "verification code: 123456"
            const patterns = [
                /code is (\d{6})/i,
                /code: (\d{6})/i,
                /verification code: (\d{6})/i,
                /verification code is (\d{6})/i,
                /(\d{6}) is your code/i,
                /your verification code is (\d{6})/i,
                /your code is (\d{6})/i,
                /(\d{6})/  // Any 6-digit number as fallback
            ];
            
            for (const pattern of patterns) {
                const match = text.match(pattern);
                if (match) return match[1];
            }
            return null;
        }
        
        // Clean HTML to plain text
        function cleanHtml(html) {
            if (!html) return '';
            // Remove style tags and their contents
            let text = html.replace(/<style[^>]*>.*?<\/style>/gis, '');
            // Remove script tags
            text = text.replace(/<script[^>]*>.*?<\/script>/gis, '');
            // Replace <br> and <div> with newlines
            text = text.replace(/<br\s*\/?>/gi, '\n');
            text = text.replace(/<\/div>/gi, '\n');
            // Remove all other HTML tags
            text = text.replace(/<[^>]*>/g, '');
            // Decode HTML entities
            text = text.replace(/&nbsp;/g, ' ');
            text = text.replace(/&amp;/g, '&');
            text = text.replace(/&lt;/g, '<');
            text = text.replace(/&gt;/g, '>');
            // Remove extra whitespace
            text = text.replace(/\n\s*\n/g, '\n');
            return text.trim();
        }
        
        async function checkInbox() {
            if (!currentSidToken) {
                alert('Create an email first');
                return;
            }
            
            try {
                const response = await fetch(`${API_URL}?f=get_email_list&offset=0&sid_token=${currentSidToken}`);
                const data = await response.json();
                
                if (data && data.list && data.list.length > 0) {
                    let html = '<h3>📥 Inbox</h3>';
                    
                    for (const email of data.list) {
                        // Fetch full email
                        const bodyResponse = await fetch(`${API_URL}?f=fetch_email&email_id=${email.mail_id}&sid_token=${currentSidToken}`);
                        const fullEmail = await bodyResponse.json();
                        
                        // Get clean text from HTML or plain text
                        let rawText = '';
                        if (fullEmail.mail_body_html) {
                            rawText = cleanHtml(fullEmail.mail_body_html);
                        } else if (fullEmail.mail_body) {
                            rawText = fullEmail.mail_body;
                        }
                        
                        // Extract verification code
                        const code = extractCode(rawText);
                        
                        html += `
                            <div class="email-card">
                                <div class="subject">📌 ${escapeHtml(email.mail_subject || '(no subject)')}</div>
                                <div class="from">✉️ From: ${escapeHtml(email.mail_from || 'unknown')}</div>
                                ${code ? `<div class="code">🔑 Verification Code: ${code}</div>` : ''}
                                <div class="body">${escapeHtml(rawText.substring(0, 500))}${rawText.length > 500 ? '...' : ''}</div>
                                <div class="date">🕐 ${new Date(email.mail_timestamp * 1000).toLocaleString()}</div>
                            </div>
                        `;
                    }
                    
                    document.getElementById('inbox').innerHTML = html;
                } else {
                    document.getElementById('inbox').innerHTML = '<p>📭 No emails yet.</p>';
                }
            } catch (error) {
                document.getElementById('inbox').innerHTML = `<p style="color:red">Error: ${error.message}</p>`;
            }
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function copyEmail() {
            const email = document.getElementById('emailAddress').textContent;
            navigator.clipboard.writeText(email);
            alert('Email copied!');
        }
        
        // Auto-create on load
        window.addEventListener('load', () => {
            createEmail();
            // Auto-refresh every 10 seconds
            setInterval(() => {
                if (currentSidToken) checkInbox();
            }, 10000);
        });
    </script>
</body>
</html>
