<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Apollo Temporary Email</title>
  <style>
    :root {
      --primary: #ff8c00;
      --primary-glow: rgba(255, 140, 0, 0.4);
      --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1e1e 100%);
      --card-bg: rgba(30, 41, 59, 0.7);
      --text: #f8fafc;
      --text-muted: #94a3b8;
      --border: rgba(255, 140, 0, 0.3);
      --success: #22c55e;
    }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      margin: 0;
      padding: 2rem 1rem;
      background: var(--bg-gradient);
      background-attachment: fixed;
      color: var(--text);
      min-height: 100vh;
    }

    #expiry-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.95);
      color: var(--primary);
      z-index: 9999;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-family: "Segoe UI", Tahoma, sans-serif;
      backdrop-filter: blur(10px);
    }

    .container { max-width: 650px; margin: 0 auto; }

    .top-stats {
      position: fixed;
      top: 1rem;
      right: 1rem;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 0.5rem;
      z-index: 100;
    }

    #countdown-timer {
      padding: 0.6rem 1.2rem;
      background: var(--primary);
      color: #000;
      border-radius: 50px;
      font-weight: 800;
      font-size: 0.9rem;
      box-shadow: 0 0 15px var(--primary-glow);
    }

    .active-users {
      background: rgba(0, 0, 0, 0.5);
      padding: 0.4rem 0.8rem;
      border-radius: 20px;
      font-size: 0.75rem;
      display: flex;
      align-items: center;
      gap: 6px;
      border: 1px solid var(--border);
    }

    .status-dot {
      width: 8px;
      height: 8px;
      background: var(--success);
      border-radius: 50%;
      box-shadow: 0 0 8px var(--success);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0% { opacity: 1; }
      50% { opacity: 0.5; }
      100% { opacity: 1; }
    }

    .email-section { text-align: center; margin-bottom: 3rem; }
    .email-label { 
      font-size: 0.8rem; 
      color: var(--primary); 
      letter-spacing: 2px; 
      display: block; 
      margin-bottom: 0.7rem; 
      font-weight: bold;
    }
    
    .email-box {
      display: inline-block;
      padding: 1rem 2rem;
      background: var(--card-bg);
      border: 2px solid var(--primary);
      border-radius: 12px;
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--text);
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 0 10px rgba(0,0,0,0.5);
    }

    .email-box:hover {
      transform: translateY(-3px);
      box-shadow: 0 0 25px var(--primary-glow);
      border-color: #ffbd69;
    }

    .inbox {
      background: var(--card-bg);
      border-radius: 16px;
      border: 1px solid var(--border);
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      overflow: hidden;
      backdrop-filter: blur(5px);
    }

    .inbox-header {
      padding: 1.5rem;
      margin: 0;
      font-size: 1.4rem;
      color: var(--primary);
      border-bottom: 1px solid var(--border);
      background: rgba(0,0,0,0.2);
    }

    .message {
      padding: 1.25rem;
      border-bottom: 1px solid var(--border);
      transition: all 0.2s;
    }

    .message:hover { background: rgba(255, 140, 0, 0.05); }

    .message strong { 
      display: block; 
      margin-bottom: 0.3rem; 
      color: #fff;
    }

    .message-content { color: var(--text-muted); font-size: 0.95rem; }
    
    .message-time { 
      display: block; 
      margin-top: 0.8rem; 
      font-size: 0.75rem; 
      color: var(--primary); 
    }

    h1.brand-name {
        text-align: center;
        font-size: 2.5rem;
        background: linear-gradient(to right, #ff8c00, #ffbd69);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
    }
  </style>
</head>
<body>

  <div id="expiry-overlay">
    <h1 style="font-size: 5rem; margin: 0;">⌛</h1>
    <p style="font-size: 1.5rem;">Session Expired</p>
    <p>Refresh to generate a new session.</p>
  </div>

  <div class="top-stats">
    <div id="countdown-timer">Syncing...</div>
    <div class="active-users">
      <div class="status-dot"></div>
      <span id="user-count">0</span> online
    </div>
  </div>

  <main class="container">
    <h1 class="brand-name">Apollo</h1>
    <div class="email-section">
      <span class="email-label">YOUR TEMPORARY ADDRESS</span>
      <div class="email-box" id="email-display">Loading...</div>
    </div>

    <section id="messages" class="inbox">
      <h2 class="inbox-header">Inbox</h2>
    </section>
  </main>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-app.js";
    import { getDatabase, ref, onChildAdded, onValue, set, push, onDisconnect } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyD-WF53vjG-22Zdt8ZaQMVmMB4XRhB5IDg",
      authDomain: "temp-email-aeea9.firebaseapp.com",
      databaseURL: "https://temp-email-aeea9-default-rtdb.firebaseio.com",
      projectId: "temp-email-aeea9",
      storageBucket: "temp-email-aeea9.firebasestorage.app",
      messagingSenderId: "277065724504",
      appId: "1:277065724504:web:4b11571de5990e09c3d02d"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const timerRef = ref(db, 'system/expiryTime');
    const emailRef = ref(db, 'userEmail');
    const msgsRef = ref(db, 'messages');
    const presenceRef = ref(db, 'system/presence');
    const connectedRef = ref(db, '.info/connected');

    const timerDisplay = document.getElementById('countdown-timer');
    const emailDisplay = document.getElementById('email-display');
    const messagesContainer = document.getElementById('messages');
    const overlay = document.getElementById('expiry-overlay');
    const userCountDisplay = document.getElementById('user-count');

    // Presence Logic
    onValue(connectedRef, (snap) => {
      if (snap.val() === true) {
        const con = push(presenceRef);
        onDisconnect(con).remove();
        set(con, true);
      }
    });

    onValue(presenceRef, (snap) => {
      userCountDisplay.textContent = snap.size || 0;
    });

    // Timer Logic: Persistent and Real-time
    onValue(timerRef, (snapshot) => {
      let expiry = snapshot.val();
      
      if (!expiry) {
        expiry = Date.now() + (24 * 60 * 60 * 1000);
        set(timerRef, expiry);
      }

      if (window.tick) clearInterval(window.tick);

      window.tick = setInterval(() => {
        const now = Date.now();
        const diff = expiry - now;

        if (diff <= 0) {
          clearInterval(window.tick);
          timerDisplay.textContent = "Expired";
          overlay.style.display = 'flex';
          return;
        }

        const h = Math.floor(diff / 3600000).toString().padStart(2, '0');
        const m = Math.floor((diff % 3600000) / 60000).toString().padStart(2, '0');
        const s = Math.floor((diff % 60000) / 1000).toString().padStart(2, '0');
        timerDisplay.textContent = `⏱️ ${h}:${m}:${s}`;
      }, 1000);
    });

    onValue(emailRef, (snap) => {
      emailDisplay.textContent = snap.val() || "waiting...";
    });

    onChildAdded(msgsRef, (snap) => {
      const data = snap.val();
      const msgCard = document.createElement('article');
      msgCard.className = 'message';
      const timeStr = data.timestamp ? new Date(data.timestamp).toLocaleString() : new Date().toLocaleString();

      msgCard.innerHTML = `
        <strong>${data.title || 'No Subject'}</strong>
        <div class="message-content">${data.content || ''}</div>
        <span class="message-time">📅 ${timeStr}</span>
      `;
      
      const header = messagesContainer.querySelector('.inbox-header');
      messagesContainer.insertBefore(msgCard, header.nextSibling);
    });

    emailDisplay.onclick = () => {
      navigator.clipboard.writeText(emailDisplay.textContent);
      const original = emailDisplay.textContent;
      emailDisplay.textContent = "Copied!";
      setTimeout(() => emailDisplay.textContent = original, 1000);
    };
  </script>
</body>
</html>
