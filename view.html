<!DOCTYPE html>
<html>
<head>
    <title>Guerrilla Mail - Full View Extractor</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; max-width: 900px; margin: 30px auto; padding: 20px; background-color: #f4f7f6; }
        .container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { color: #2c3e50; text-align: center; }
        .controls { display: flex; gap: 10px; margin-bottom: 20px; align-items: center; justify-content: center; }
        button { padding: 12px 20px; font-size: 14px; background: #3498db; color: white; border: none; border-radius: 6px; cursor: pointer; transition: 0.3s; }
        button:hover { background: #2980b9; }
        .btn-refresh { background: #2ecc71; }
        .btn-refresh:hover { background: #27ae60; }
        .email-card { border: 1px solid #e0e0e0; margin: 20px 0; padding: 20px; border-radius: 10px; background: #fff; }
        .subject { font-size: 20px; font-weight: bold; color: #2c3e50; border-bottom: 2px solid #eee; padding-bottom: 10px; margin-bottom: 10px; }
        .from { color: #7f8c8d; font-size: 14px; margin-bottom: 15px; }
        .email-content-wrapper { border: 1px solid #eee; padding: 15px; border-radius: 5px; background: #ffffff; overflow-x: auto; }
        .code-box { background: #f1c40f; padding: 15px; font-size: 24px; font-weight: bold; text-align: center; margin: 15px 0; border-radius: 8px; color: #000; }
        .email-badge { background: #ebf5fb; padding: 15px; border-radius: 8px; text-align: center; margin-bottom: 20px; border: 1px dashed #3498db; }
        input { padding: 12px; font-size: 16px; border: 1px solid #ccc; border-radius: 6px; }
        .date { font-size: 12px; color: #bdc3c7; margin-top: 15px; text-align: right; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📧 Full Message Extractor</h1>
        
        <div class="controls">
            <input type="text" id="username" value="yaxjbbiq">
            <span>@guerrillamailblock.com</span>
            <button onclick="createEmail()">Update Inbox</button>
            <button class="btn-refresh" onclick="checkInbox()">🔄 Refresh Now</button>
        </div>
        
        <div id="currentEmail" style="display: none;">
            <div class="email-badge">
                <strong>📫 Active Address:</strong> <span id="emailAddress"></span>
                <button onclick="copyEmail()" style="padding: 5px 10px; margin-left: 10px; background: #95a5a6;">📋 Copy</button>
            </div>
        </div>
        
        <div id="inbox">
            <p style="text-align: center; color: #95a5a6;">Initialising mailbox...</p>
        </div>
    </div>

    <script>
        let currentSidToken = null;
        const API_URL = 'https://api.guerrillamail.com/ajax.php';

        async function createEmail() {
            let username = document.getElementById('username').value.trim();
            const domain = 'guerrillamailblock.com';
            
            try {
                const response = await fetch(`${API_URL}?f=set_email_user&email_user=${username}&site=guerrillamail.com&domain=${domain}`);
                const data = await response.json();
                
                if (data && data.email_addr) {
                    currentSidToken = data.sid_token;
                    document.getElementById('emailAddress').textContent = data.email_addr;
                    document.getElementById('currentEmail').style.display = 'block';
                    await checkInbox();
                }
            } catch (error) {
                console.error(error);
            }
        }
        
        function extractCode(text) {
            const patterns = [/code is (\d{4,8})/i, /code: (\d{4,8})/i, /verification code:? (\d{4,8})/i, /(\d{4,8}) is your code/i];
            for (const pattern of patterns) {
                const match = text.match(pattern);
                if (match) return match[1];
            }
            return null;
        }

        async function checkInbox() {
            if (!currentSidToken) return;
            
            try {
                const response = await fetch(`${API_URL}?f=get_email_list&offset=0&sid_token=${currentSidToken}`);
                const data = await response.json();
                
                if (data && data.list && data.list.length > 0) {
                    let html = '<h3>📥 Recent Messages</h3>';
                    
                    for (const email of data.list) {
                        const bodyRes = await fetch(`${API_URL}?f=fetch_email&email_id=${email.mail_id}&sid_token=${currentSidToken}`);
                        const fullEmail = await bodyRes.json();
                        
                        // Use HTML body if available, otherwise use plain text
                        const displayContent = fullEmail.mail_body_html || fullEmail.mail_body.replace(/\n/g, '<br>');
                        const vCode = extractCode(fullEmail.mail_body);
                        
                        html += `
                        <div class="email-card">
                            <div class="subject">${email.mail_subject}</div>
                            <div class="from">From: ${email.mail_from}</div>`;
                        
                        if (vCode) {
                            html += `<div class="code-box">🔑 Verification Code: ${vCode}</div>`;
                        }

                        html += `
                            <div class="email-content-wrapper">
                                ${displayContent}
                            </div>
                            <div class="date">Received: ${email.mail_date}</div>
                        </div>`;
                    }
                    document.getElementById('inbox').innerHTML = html;
                } else {
                    document.getElementById('inbox').innerHTML = '<p style="text-align:center;">📭 Waiting for new messages...</p>';
                }
            } catch (error) {
                document.getElementById('inbox').innerHTML = `<p style="color:red">Connection Error: ${error.message}</p>`;
            }
        }
        
        function copyEmail() {
            const email = document.getElementById('emailAddress').textContent;
            navigator.clipboard.writeText(email);
        }
        
        window.onload = () => {
            createEmail();
            setInterval(checkInbox, 10000); 
        };
    </script>
</body>
</html>
